<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes action-body{0%,25%,30%,40%,45%,60%,8%{transform:scale(1,1) translate(0,0)}12%,22%{transform:scale(1,1) translate(1px,0)}48%,57%{transform:scale(1,1) translate(-1px,0)}33%,38%{transform:scale(1,1) translate(.5px,0)}}@keyframes shadow-action{0%,25%,30%,40%,45%,60%,8%{transform:scaleX(1) translate(0,0);opacity:.5}12%,22%{transform:scaleX(1) translate(1px,0);opacity:.5}48%,57%{transform:scaleX(1) translate(-1px,0);opacity:.5}33%,38%{transform:scaleX(1) translate(.5px,0);opacity:.5}}@keyframes eye-track{0%,10%,25%,43%,60%{transform:translate(0,0)}12%,22%{transform:translate(3px,0)}48%,57%{transform:translate(-3px,0)}}@keyframes eye-blink{0%,18%,22%,3%,47%,51%,7%,78%,82%{transform:scaleY(1)}20%,49%,5%,80%{transform:scaleY(.1)}}@keyframes arm-l-idle{0%,30%,42%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(1px,-3px) rotate(15deg)}34%,36%,38%{transform:translate(1.5px,-4px) rotate(35deg)}35%,37%,39%{transform:translate(.5px,-2.5px) rotate(0deg)}}.action-body,.breathe-anim{transform-origin:7.5px 13px;animation:action-body 10s infinite ease-in-out}.breathe-anim{animation:breathe 3.2s infinite ease-in-out}.shadow-anim{transform-origin:7.5px 15.5px;animation:shadow-action 10s infinite ease-in-out}.arm-l{transform-origin:1px 10px;animation:arm-l-idle 10s infinite ease-in-out}.eyes-look{animation:eye-track 10s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:eye-blink 10s infinite linear}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-anim" opacity=".5"/><g id="legs" fill="#DE886D"><rect width="1" height="3" x="3" y="12"/><rect width="1" height="3" x="5" y="12"/><rect width="1" height="3" x="9" y="12"/><rect width="1" height="3" x="11" y="12"/></g><g class="action-body"><g class="breathe-anim"><rect id="torso" width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-l"><rect width="2" height="2" x="0" y="9" fill="#DE886D"/></g><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g fill="#000" class="eyes-look"><g class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></g></g></svg>