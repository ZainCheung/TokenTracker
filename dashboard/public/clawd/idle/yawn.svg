<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes action-body-yawn{0%,12%{transform:scale(1,1) translate(0,0)}32%{transform:scale(.95,1.05) translate(0,-1px)}50%{transform:scale(.9,1.1) translate(0,-2px)}78%{transform:scale(1.05,.95) translate(0,1px)}}@keyframes shadow-yawn{0%,12%{transform:scaleX(1);opacity:.5}32%{transform:scaleX(.95);opacity:.45}50%{transform:scaleX(.9);opacity:.4}78%{transform:scaleX(1.05);opacity:.55}}@keyframes eye-track-yawn{0%,18%,82%{transform:translate(0,0)}32%,68%{transform:translate(0,-1px)}}@keyframes eye-blink-yawn{0%,18%,30%{transform:scaleY(1)}24%,42%{transform:scaleY(.1)}}@keyframes arm-l-yawn{0%,12%{transform:translate(0,0) rotate(0deg)}38%{transform:translate(-1px,-2px) rotate(45deg)}50%{transform:translate(-2px,-3px) rotate(80deg)}78%{transform:translate(0,1px) rotate(-15deg)}}@keyframes arm-r-yawn{0%,12%{transform:translate(0,0) rotate(0deg)}38%{transform:translate(1px,-2px) rotate(-45deg)}50%{transform:translate(2px,-3px) rotate(-80deg)}78%{transform:translate(0,1px) rotate(15deg)}}@keyframes yawn-mouth-anim{0%,18%,80%{opacity:0;transform:scale(.1)}32%{opacity:1;transform:scale(.5,.2)}50%{opacity:1;transform:scale(1.1,1.4)}68%{opacity:1;transform:scale(.6,.4)}}@keyframes tear-fall{0%,45%{opacity:0;transform:translateY(0)}50%{opacity:1;transform:translateY(0)}68%{opacity:1;transform:translateY(2.5px)}80%{opacity:0;transform:translateY(3px)}}.action-body,.breathe-anim{transform-origin:7.5px 13px;animation:action-body-yawn 3.8s ease-in-out forwards}.breathe-anim{animation:breathe 3.2s infinite ease-in-out}.shadow-anim{transform-origin:7.5px 15.5px;animation:shadow-yawn 3.8s ease-in-out forwards}.arm-l{transform-origin:1px 10px;animation:arm-l-yawn 3.8s ease-in-out forwards}.arm-r{transform-origin:14px 10px;animation:arm-r-yawn 3.8s ease-in-out forwards}.eyes-look{animation:eye-track-yawn 3.8s ease-in-out forwards}.eyes-blink{transform-origin:7.5px 9px;animation:eye-blink-yawn 3.8s linear forwards}.yawn-mouth{transform-origin:7.5px 11px;animation:yawn-mouth-anim 3.8s ease-in-out forwards;opacity:0}.yawn-tear{animation:tear-fall 3.8s ease-in-out forwards;opacity:0}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-anim" opacity=".5"/><g id="legs" fill="#DE886D"><rect width="1" height="3" x="3" y="12"/><rect width="1" height="3" x="5" y="12"/><rect width="1" height="3" x="9" y="12"/><rect width="1" height="3" x="11" y="12"/></g><g class="action-body"><g class="breathe-anim"><rect id="torso" width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-l"><rect width="2" height="2" x="0" y="9" fill="#DE886D"/></g><g class="arm-r"><rect width="2" height="2" x="13" y="9" fill="#DE886D"/></g><rect width="3" height="2" x="6" y="10" fill="#000" class="yawn-mouth"/><g fill="#000" class="eyes-look"><g class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g><rect width="1" height="1" x="3.5" y="10" fill="#40C4FF" class="yawn-tear"/></g></g></svg>