<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes doze-breathe{0%{transform:scale(1.05,.95) translate(0,1px)}50%{transform:scale(1.08,.92) translate(0,1.8px)}}@keyframes doze-shadow{0%{transform:scaleX(1.05);opacity:.55}50%{transform:scaleX(1.08);opacity:.5}}.doze-body{transform-origin:7.5px 13px;animation:doze-breathe 4s infinite ease-in-out}.doze-shadow{transform-origin:7.5px 15.5px;animation:doze-shadow 4s infinite ease-in-out}.eyes-shut{transform-origin:7.5px 9px;transform:scaleY(.1);transition:transform .3s ease-out}.arm-l-doze{transform-origin:1px 10px;transform:translate(0,1px) rotate(-15deg)}.arm-r-doze{transform-origin:14px 10px;transform:translate(0,1px) rotate(15deg)}</style></defs><rect width="9" height="1" x="3" y="15" fill="#000" class="doze-shadow" opacity=".55"/><g id="legs" fill="#DE886D"><rect width="1" height="3" x="3" y="12"/><rect width="1" height="3" x="5" y="12"/><rect width="1" height="3" x="9" y="12"/><rect width="1" height="3" x="11" y="12"/></g><g class="doze-body"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-l-doze"><rect width="2" height="2" x="0" y="9" fill="#DE886D"/></g><g class="arm-r-doze"><rect width="2" height="2" x="13" y="9" fill="#DE886D"/></g><g id="eyes-doze" fill="#000" class="eyes-shut"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></svg>