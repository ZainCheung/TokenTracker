<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes eye-blink{0%,10%{transform:scaleY(1)}5%{transform:scaleY(.1)}}.breathe-anim{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:eye-blink 4s infinite ease-in-out}#body-js,#eyes-js,#shadow-js{transition:transform .2s ease-out}#shadow-js{transform-origin:7.5px 15px}</style></defs><g id="shadow-js"><rect width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/></g><g id="legs" fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g id="body-js"><g class="breathe-anim"><rect id="torso" width="11" height="7" x="2" y="6" fill="#DE886D"/><rect width="2" height="2" x="0" y="9" fill="#DE886D"/><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g id="eyes-js" fill="#000"><g class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></g></g></svg>