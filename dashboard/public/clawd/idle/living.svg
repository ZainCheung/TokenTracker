<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes action-body{0%,26%,38%,55%,76%,8%,80%{transform:scale(1,1) translate(0,0)}12%,22%{transform:scale(1,1) translate(1px,0)}42%,50%{transform:scale(1,1) translate(-1px,0)}30%,36%{transform:scale(1,1) translate(.5px,0)}60%{transform:scale(.95,1.05) translate(0,-1px)}65%{transform:scale(.9,1.1) translate(0,-2px)}72%{transform:scale(1.05,.95) translate(0,1px)}}@keyframes shadow-action{0%,26%,38%,55%,76%,8%,80%{transform:scaleX(1) translate(0,0);opacity:.5}12%,22%{transform:scaleX(1) translate(1px,0);opacity:.5}42%,50%{transform:scaleX(1) translate(-1px,0);opacity:.5}30%,36%{transform:scaleX(1) translate(.5px,0);opacity:.5}60%{transform:scaleX(.95) translate(0,0);opacity:.45}65%{transform:scaleX(.9) translate(0,0);opacity:.4}72%{transform:scaleX(1.05) translate(0,0);opacity:.55}}@keyframes eye-track{0%,10%,25%,38%,52%,58%,80%{transform:translate(0,0)}12%,22%{transform:translate(3px,0)}42%,50%{transform:translate(-3px,0)}60%,75%{transform:translate(0,-1px)}}@keyframes eye-blink{0%,18%,22%,3%,43%,47%,56%,60%,7%,75%,83%,87%{transform:scaleY(1)}20%,45%,5%,62%,72%,85%{transform:scaleY(.1)}}@keyframes arm-l-idle{0%,28%,38%,58%,76%{transform:translate(0,0) rotate(0deg)}30%{transform:translate(1px,-3px) rotate(15deg)}31%,33%,35%{transform:translate(1.5px,-4px) rotate(35deg)}32%,34%,36%{transform:translate(.5px,-2.5px) rotate(0deg)}62%{transform:translate(-1px,-2px) rotate(45deg)}65%{transform:translate(-2px,-3px) rotate(80deg)}72%{transform:translate(0,1px) rotate(-15deg)}}@keyframes arm-r-idle{0%,58%,76%{transform:translate(0,0) rotate(0deg)}62%{transform:translate(1px,-2px) rotate(-45deg)}65%{transform:translate(2px,-3px) rotate(-80deg)}72%{transform:translate(0,1px) rotate(15deg)}}@keyframes yawn-mouth-anim{0%,58%,75%,76%{opacity:0;transform:scale(.1)}60%{opacity:1;transform:scale(.5,.2)}65%{opacity:1;transform:scale(1.1,1.4)}72%{opacity:1;transform:scale(.6,.4)}}@keyframes tear-fall{0%,64%,80%{opacity:0;transform:translateY(0)}66%{opacity:1;transform:translateY(0)}72%{opacity:1;transform:translateY(2.5px)}75%{opacity:0;transform:translateY(3px)}}.action-body,.breathe-anim{transform-origin:7.5px 13px;animation:action-body 16s infinite ease-in-out}.breathe-anim{animation:breathe 3.2s infinite ease-in-out}.shadow-anim{transform-origin:7.5px 15.5px;animation:shadow-action 16s infinite ease-in-out}.arm-l{transform-origin:1px 10px;animation:arm-l-idle 16s infinite ease-in-out}.arm-r{transform-origin:14px 10px;animation:arm-r-idle 16s infinite ease-in-out}.eyes-look{animation:eye-track 16s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:eye-blink 16s infinite linear}.yawn-mouth{transform-origin:7.5px 11px;animation:yawn-mouth-anim 16s infinite ease-in-out;opacity:0}.yawn-tear{animation:tear-fall 16s infinite ease-in-out;opacity:0}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-anim" opacity=".5"/><g id="legs" fill="#DE886D"><rect id="outer-left-leg" width="1" height="3" x="3" y="12"/><rect id="inner-left-leg" width="1" height="3" x="5" y="12"/><rect id="inner-right-leg" width="1" height="3" x="9" y="12"/><rect id="outer-right-leg" width="1" height="3" x="11" y="12"/></g><g class="action-body"><g class="breathe-anim"><rect id="torso" width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-l"><rect id="left-arm" width="2" height="2" x="0" y="9" fill="#DE886D"/></g><g class="arm-r"><rect id="right-arm" width="2" height="2" x="13" y="9" fill="#DE886D"/></g><rect width="3" height="2" x="6" y="10" fill="#000" class="yawn-mouth"/><g fill="#000" class="eyes-look"><g class="eyes-blink"><rect id="left-eye" width="1" height="2" x="4" y="8"/><rect id="right-eye" width="1" height="2" x="10" y="8"/></g></g><rect width="1" height="1" x="3.5" y="10" fill="#40C4FF" class="yawn-tear"/></g></g></svg>