<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes body-collapse{0%{transform:scale(1.05,.95) translate(0,1px)}40%{transform:scale(1.08,.85) translate(0,1.5px)}70%{transform:scale(1.12,.75) translate(0,2px)}}@keyframes shadow-collapse{0%{transform:scaleX(1.05);opacity:.55}}@keyframes legs-collapse{0%,40%{transform:translate(0,0) scaleY(1)}70%{transform:translate(0,-1px) scaleY(.6)}}@keyframes arm-l-collapse{0%{transform:translate(0,1px) rotate(-15deg)}50%{transform:translate(0,2px) rotate(-5deg)}}@keyframes arm-r-collapse{0%{transform:translate(0,1px) rotate(15deg)}50%{transform:translate(0,2px) rotate(5deg)}}.body-collapse{transform-origin:7.5px 13px;animation:body-collapse 1s ease-in -.2s forwards}.shadow-collapse{transform-origin:7.5px 15.5px;animation:shadow-collapse 1s ease-in -.2s forwards}.legs-collapse{transform-origin:7.5px 12px;animation:legs-collapse 1s ease-in -.2s forwards}.arm-l-collapse{transform-origin:1px 10px;animation:arm-l-collapse 1s ease-in -.2s forwards}.arm-r-collapse{transform-origin:14px 10px;animation:arm-r-collapse 1s ease-in -.2s forwards}.eyes-shut{transform-origin:7.5px 9px;transform:scaleY(.1)}</style></defs><rect width="9" height="1" x="3" y="15" fill="#000" class="shadow-collapse" opacity=".55"/><g fill="#DE886D" class="legs-collapse"><rect width="1" height="3" x="3" y="12"/><rect width="1" height="3" x="5" y="12"/><rect width="1" height="3" x="9" y="12"/><rect width="1" height="3" x="11" y="12"/></g><g class="body-collapse"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-l-collapse"><rect width="2" height="2" x="0" y="9" fill="#DE886D"/></g><g class="arm-r-collapse"><rect width="2" height="2" x="13" y="9" fill="#DE886D"/></g><g fill="#000" class="eyes-shut"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></svg>