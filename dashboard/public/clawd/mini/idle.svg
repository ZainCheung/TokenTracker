<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes eye-blink{0%,10%{transform:scaleY(1)}5%{transform:scaleY(.1)}}@keyframes arm-wobble{0%,91%,97%{transform:rotate(0deg)}92%{transform:rotate(18deg)}93.5%{transform:rotate(-5deg)}95%{transform:rotate(14deg)}}.breathe-anim{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:eye-blink 4s infinite ease-in-out}#eyes-js{transition:transform .2s ease-out}.arm-wobble{transform-box:fill-box;transform-origin:100% 0;animation:arm-wobble 25s infinite ease-in-out}</style></defs><g transform="rotate(-12, 7.5, 15)"><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g id="body-js"><g class="breathe-anim"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-wobble"><rect width="4.5" height="2" x="-1.5" y="9" fill="#DE886D"/></g><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g id="eyes-js" fill="#000"><g class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></g></g></g></svg>