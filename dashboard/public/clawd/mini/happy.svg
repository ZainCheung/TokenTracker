<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes arm-happy-wave{0%{transform:rotate(22deg)}}@keyframes happy-blink{0%,12%,30%,42%{transform:scaleY(1)}36%,6%{transform:scaleY(.1)}}@keyframes flash-center{0%,30%{opacity:0}10%{opacity:1}}@keyframes flash-outer{0%,40%{opacity:0}20%{opacity:1}}.breathe-anim{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}.arm-happy{transform-origin:2px 9px;animation:arm-happy-wave .4s infinite alternate ease-in-out}.eyes-happy-blink{transform-origin:7.5px 9px;animation:happy-blink 3s infinite ease-in-out}.spark-center,.spark-outer{opacity:0;animation:flash-center 1.5s infinite step-end;animation-delay:var(--delay, 0s)}.spark-outer{animation:flash-outer 1.5s infinite step-end}</style><g id="px-sparkle"><rect width="1" height="1" x="-.5" y="-.5" class="spark-center"/><path d="M -0.5,-1.5 h1 v1 h-1 z M -0.5,0.5 h1 v1 h-1 z M -1.5,-0.5 h1 v1 h-1 z M 0.5,-0.5 h1 v1 h-1 z" class="spark-outer"/></g></defs><g transform="rotate(-12, 7.5, 15)"><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g id="body-js"><g class="breathe-anim"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-happy"><rect width="4.5" height="2" x="-1.5" y="9" fill="#DE886D"/><rect width=".5" height="3" x="-1.5" y="6" fill="#000"/><rect width=".8" height=".8" x="-2.5" y="5" fill="gold"/><rect width=".8" height=".8" x="-.5" y="5" fill="gold"/><rect width=".8" height=".8" x="-1.5" y="4.2" fill="gold"/><rect width=".8" height=".8" x="-1.5" y="5.8" fill="gold"/><rect width=".8" height=".8" x="-1.5" y="5" fill="#FFA000"/></g><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g class="eyes-happy-blink"><g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width=".7"><polyline points="3.5 9 4.5 8 5.5 9"/><polyline points="9.5 9 10.5 8 11.5 9"/></g></g></g></g></g><use style="--delay:0s" x="-3" y="0" fill="gold" href="#px-sparkle"/><use style="--delay:0.4s" x="-6" y="6" fill="#FFA000" href="#px-sparkle"/><use style="--delay:0.8s" x="0" y="-5" fill="#FFF59D" href="#px-sparkle"/></svg>