<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" shape-rendering="crispEdges" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.015,.985) translate(0,.3px)}}@keyframes arm-drift{0%,94%{transform:rotate(0deg)}96%{transform:rotate(3deg)}98%{transform:rotate(-1deg)}}@keyframes float-1{0%{transform:translate(-2px,6px) scale(.4);opacity:0}10%{opacity:1}30%{transform:translate(-5px,3px) scale(.6)}50%{transform:translate(-3px,0) scale(.8)}70%{transform:translate(-6px,-3px) scale(1)}90%{opacity:.8}}@keyframes float-2{0%{transform:translate(-3px,7px) scale(.3);opacity:0}10%{opacity:1}30%{transform:translate(-6px,4px) scale(.5)}50%{transform:translate(-4px,1px) scale(.7)}70%{transform:translate(-7px,-2px) scale(.9)}90%{opacity:.8}}@keyframes float-3{0%{transform:translate(-1px,5px) scale(.5);opacity:0}10%{opacity:1}30%{transform:translate(-4px,2px) scale(.7)}50%{transform:translate(-2px,-1px) scale(.9)}70%{transform:translate(-5px,-4px) scale(1.1)}90%{opacity:.8}}.breathe-anim{transform-origin:7.5px 13px;animation:breathe 5s infinite ease-in-out}.arm-wobble{transform-box:fill-box;transform-origin:100% 0;animation:arm-drift 50s infinite ease-in-out}.z-particle{opacity:0}.z1{animation:float-1 6s infinite ease-in-out 0s}.z2{animation:float-2 6s infinite ease-in-out 2s}.z3{animation:float-3 6s infinite ease-in-out 4s}</style><g id="pixel-z"><rect width="4" height="1" x="0" y="0"/><rect width="1" height="1" x="2" y="1"/><rect width="1" height="1" x="1" y="2"/><rect width="4" height="1" x="0" y="3"/></g><g id="pixel-z-small"><rect width="3" height="1" x="0" y="0"/><rect width="1" height="1" x="1" y="1"/><rect width="3" height="1" x="0" y="2"/></g></defs><use fill="#90A4AE" class="z-particle z1" href="#pixel-z"/><use fill="#B0BEC5" class="z-particle z2" href="#pixel-z-small"/><use fill="#CFD8DC" class="z-particle z3" href="#pixel-z"/><g transform="rotate(-12, 7.5, 15)"><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g id="body-js"><g class="breathe-anim"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-wobble"><rect width="4.5" height="2" x="-1.5" y="9" fill="#DE886D"/></g><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g id="eyes-js" fill="#000"><rect width="2" height=".4" x="3.5" y="8.8"/><rect width="2" height=".4" x="9.5" y="8.8"/></g></g></g></g></svg>