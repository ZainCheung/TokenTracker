<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" shape-rendering="crispEdges" viewBox="-15 -25 45 45"><style>@keyframes bodyEnter{0%{transform:translate(25px,0)}18%{transform:translate(-3px,-.8px)}24%{transform:translate(1.4px,.4px)}30%{transform:translate(0,0)}}@keyframes armEnterSleep{0%,30%{transform:scaleX(.05) rotate(0deg)}50%{transform:scaleX(1) rotate(0deg)}}#body-js{animation:bodyEnter 3.2s cubic-bezier(.22,1,.36,1) 1 forwards}#left-arm{transform-origin:2px 9px;animation:armEnterSleep 3.2s ease-in-out 1 forwards}</style><g id="body-js"><g transform="rotate(-12, 7.5, 15)"><rect id="left-arm" width="4.5" height="2" x="-1.5" y="9" fill="#DE886D"/><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g id="eyes-js" fill="#000"><rect width="2" height=".4" x="3.5" y="8.8"/><rect width="2" height=".4" x="9.5" y="8.8"/></g><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g></g></g></svg>