<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes hunch-walk{0%{transform:translate(-2px,1px) rotate(2deg)}}@keyframes shadow-shift{0%{transform:translateX(-2px) scale(.9);opacity:.4}}@keyframes sneak-1{0%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-25deg) scaleY(.7)}}@keyframes sneak-2{0%{transform:rotate(-25deg) scaleY(.7)}50%{transform:rotate(0deg) scaleY(1)}}@keyframes crab-eyes{0%,55%,92%{transform:translateX(2px) scaleY(1)}62%,70%,80%,85%{transform:translateX(0) scaleY(1)}66%,75%{transform:translateX(0) scaleY(.1)}}.body-hunch{transform-origin:7.5px 15px;animation:hunch-walk 2s infinite alternate ease-in-out}.leg-1,.leg-2{animation:sneak-1 .5s infinite linear;transform-origin:top center;transform-box:fill-box}.leg-2{animation:sneak-2 .5s infinite linear}.shadow-sneak{transform-origin:7.5px 15.5px;animation:shadow-shift 2s infinite alternate ease-in-out}.eyes-crabwalk{transform-origin:7.5px 9px;animation:crab-eyes 5s infinite ease-in-out}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-sneak" opacity=".5"/><g class="body-hunch"><g id="legs" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13" class="leg-1"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13" class="leg-2"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13" class="leg-1"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13" class="leg-2"/></g><g id="body-color-group" fill="#DE886D"><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="2" x="0" y="9"/><rect id="right-arm" width="2" height="2" x="13" y="9"/></g><g fill="#000" class="eyes-crabwalk"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></svg>