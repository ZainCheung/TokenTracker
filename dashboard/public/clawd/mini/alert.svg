<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe{0%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}@keyframes alert-arm{0%,49%,92%{transform:rotate(0deg)}51%,64%,72%,80%,88%{transform:rotate(20deg)}60%,68%,76%,84%{transform:rotate(-8deg)}}@keyframes rect-move{0%,16%,34%,37%,39%,42%{transform:translate(0,0) scaleY(1)}22%,28%{transform:translate(-2px,0) scaleY(1)}36%,41%{transform:translate(0,0) scaleY(.1)}}@keyframes rect-vis{0%,91%{visibility:visible}42%{visibility:hidden}}@keyframes xmark-vis{0%,89%{visibility:hidden}42%{visibility:visible}}@keyframes alert-flash{0%,8%{opacity:0;transform:scale(.5)}12%{opacity:1;transform:translate(0,-4px) scale(1.2)}20%,70%{opacity:1;transform:translate(0,-4px) scale(1)}85%{opacity:0;transform:translate(0,-6px) scale(.8)}}.breathe-anim{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}.arm-alert{transform-origin:2px 9px;animation:alert-arm 4s infinite ease-in-out}.eyes-rect{transform-origin:7.5px 9px;animation:rect-vis 4s infinite step-end,rect-move 4s infinite ease-in-out}.eyes-xmark{visibility:hidden;animation:xmark-vis 4s infinite step-end}.alert-pop{animation:alert-flash 4s infinite ease-in-out;opacity:0}</style></defs><g transform="rotate(-12, 7.5, 15)"><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g id="body-js"><g class="breathe-anim"><rect width="11" height="7" x="2" y="6" fill="#DE886D"/><g class="arm-alert"><rect width="4.5" height="2" x="-1.5" y="9" fill="#DE886D"/></g><rect width="2" height="2" x="13" y="9" fill="#DE886D"/><g fill="#000" class="eyes-rect"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g><g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width=".7" class="eyes-xmark"><polyline points="4 8 5.5 9 4 10"/><polyline points="11 8 9.5 9 11 10"/></g></g></g></g><g fill="#FF3D00" class="alert-pop"><rect width="2" height="4" x="-8" y="5"/><rect width="2" height="2" x="-8" y="10"/></g></svg>