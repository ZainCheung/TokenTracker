<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes heavy-breathe{0%{transform:scale(1,1) translateY(0)}50%{transform:scale(1.05,.9) translateY(1.5px)}}@keyframes fan-self{0%{transform:rotate(0deg)}}@keyframes puff-smoke{0%{transform:translate(7.5px,6px) scale(.5);opacity:0}20%{opacity:.6}}@keyframes error-flash{0%{opacity:1}50%{opacity:.15}}.body-exhausted{transform-origin:7.5px 15px;animation:heavy-breathe 2.5s infinite ease-in-out}.arm-fan{transform-origin:14px 10px;animation:fan-self .4s infinite alternate ease-in-out}.smoke{opacity:0;animation:puff-smoke 3s infinite ease-out}.sm1{animation-delay:0s}.sm2{animation-delay:1s}.sm3{animation-delay:2s}.error-warning{animation:error-flash .8s infinite ease-in-out}</style><g id="smoke-puff"><rect width="2" height="2" x="-1" y="-1" fill="#B0BEC5" rx=".5"/><rect width="2" height="2" x="0" y="-2" fill="#CFD8DC" rx=".5"/></g></defs><rect id="ground-shadow" width="17" height="1" x="-1" y="15" fill="#000" opacity=".5"/><g><use class="smoke sm1" href="#smoke-puff"/><use class="smoke sm2" href="#smoke-puff" transform="translate(-2, 0)"/><use class="smoke sm3" href="#smoke-puff" transform="translate(2, 0)"/></g><g class="body-exhausted"><g fill="#DE886D"><rect width="1" height="1" x="3" y="9"/><rect width="1" height="1" x="5" y="9"/><rect width="1" height="1" x="9" y="9"/><rect width="1" height="1" x="11" y="9"/></g><g fill="#DE886D"><rect width="13" height="5" x="1" y="10"/><rect width="2" height="2" x="-1" y="13"/></g><g class="arm-fan"><rect width="2" height="2" x="13" y="11" fill="#DE886D"/></g><g fill="#000"><rect width=".6" height="2.2" x="3" y="12" transform="rotate(45 3.3 13.1)"/><rect width=".6" height="2.2" x="3" y="12" transform="rotate(-45 3.3 13.1)"/><rect width=".6" height="2.2" x="10" y="12" transform="rotate(45 10.3 13.1)"/><rect width=".6" height="2.2" x="10" y="12" transform="rotate(-45 10.3 13.1)"/></g></g><g class="error-warning"><text x="7.5" y="6" fill="#FF3B30" font-family="'Söhne', 'Helvetica Neue', Arial, sans-serif" font-size="3.5" font-weight="700" text-anchor="middle">ERROR</text></g></svg>