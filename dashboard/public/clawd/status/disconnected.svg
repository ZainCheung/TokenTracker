<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes body-move{0%,5%,95%{transform:translate(0,0)}12%,22%,44%{transform:translate(-1px,0)}29%,39%,49%{transform:translate(1px,0)}56%,88%{transform:translate(1px,-1px)}}@keyframes eyes-move{0%,5%,95%{transform:translate(0,0)}12%,22%,44%{transform:translate(-2px,0)}29%,39%,49%{transform:translate(2px,0)}56%,88%{transform:translate(3px,-2px)}}@keyframes blink{0%,20%,24%,60%,64%,80%,84%{transform:scaleY(1)}22%,62%,82%{transform:scaleY(.1)}}@keyframes question-fade{0%,5%{opacity:0;transform:translate(-4px,4px) scale(.5)}12%,46%{opacity:1;transform:translate(-4px,0) scale(1)}50%{opacity:0;transform:translate(-4px,-4px) scale(1.2)}}@keyframes exclamation-fade{0%,50%{opacity:0;transform:translate(6px,0) scale(.5)}56%,85%{opacity:1;transform:translate(6px,-4px) scale(1)}90%{opacity:0;transform:translate(6px,-8px) scale(1.2)}}@keyframes ble-float{0%{transform:translate(26px,-3px)}50%{transform:translate(26px,-6px)}}@keyframes ble-shadow-pulse{0%{transform:scale(1);opacity:.3}50%{transform:scale(.8);opacity:.15}}@keyframes glow{0%{transform:scale(1);opacity:.4}50%{transform:scale(1.3);opacity:.1}}.body-anim{animation:body-move 6s infinite ease-in-out}.eyes-anim{animation:eyes-move 6s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:blink 6s infinite linear}.exclamation-mark,.question-mark{transform-origin:center}.question-mark{animation:question-fade 6s infinite ease-in-out}.exclamation-mark{animation:exclamation-fade 6s infinite ease-in-out}</style></defs><g transform="translate(15, 0) scale(-1, 1)"><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g id="legs" fill="#DE886D"><rect id="outer-left-leg" width="1" height="3" x="3" y="12"/><rect id="inner-left-leg" width="1" height="3" x="5" y="12"/><rect id="inner-right-leg" width="1" height="3" x="9" y="12"/><rect id="outer-right-leg" width="1" height="3" x="11" y="12"/></g><g class="body-anim"><g fill="#DE886D"><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="2" x="0" y="9"/><rect id="right-arm" width="2" height="2" x="13" y="9"/></g><g class="eyes-anim"><g fill="#000" class="eyes-blink"><rect id="left-eye" width="1" height="2" x="4" y="8"/><rect id="right-eye" width="1" height="2" x="10" y="8"/></g></g></g><g fill="#FFF" class="question-mark" opacity="0"><rect width="2" height="1" x="1" y="0"/><rect width="1" height="1" x="3" y="1"/><rect width="1" height="2" x="0" y="1"/><rect width="1" height="1" x="1" y="3"/><rect width="1" height="1" x="2" y="4"/><rect width="1" height="1" x="2" y="6"/></g><g fill="#0082FC" class="exclamation-mark" opacity="0"><rect width="1" height="4" x="1" y="0"/><rect width="1" height="1" x="1" y="5"/></g></g></svg>