<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes attention-jump{0%,12%,80%{transform:translate(0,0) scale(1,1)}14%,22%{transform:translate(-1.5px,0) scale(1,1)}26%,34%,42%,50%,58%,66%,74%{transform:translate(0,2px) scale(1.1,.9)}30%,38%,46%,54%,62%,70%{transform:translate(0,-10px) scale(.95,1.05)}}@keyframes shadow-pulse{0%,12%,80%{transform:scale(1);opacity:.5}14%,22%{transform:translate(-1.5px,0) scale(1);opacity:.5}26%,34%,42%,50%,58%,66%,74%{transform:scale(1.15);opacity:.6}30%,38%,46%,54%,62%,70%{transform:scale(.6);opacity:.15}}@keyframes eye-track{0%,12%,26%{transform:translate(0,0)}14%,22%{transform:translate(4px,0)}}@keyframes arm-wave-l{0%,12%,80%{transform:rotate(0deg)}14%,22%{transform:rotate(-15deg)}26%{transform:rotate(30deg)}30%,38%,46%,54%,62%,70%{transform:rotate(155deg)}34%,42%,50%,58%,66%,74%{transform:rotate(115deg)}}@keyframes arm-wave-r{0%,12%,80%{transform:rotate(0deg)}14%,22%{transform:rotate(-25deg)}26%{transform:rotate(-30deg)}30%,38%,46%,54%,62%,70%{transform:rotate(-155deg)}34%,42%,50%,58%,66%,74%{transform:rotate(-115deg)}}@keyframes alert-flash{0%,12%{opacity:0;transform:translate(15px,0) scale(.5)}14%{opacity:1;transform:translate(15px,-4px) scale(1.2)}22%{opacity:1;transform:translate(15px,-4px) scale(1)}26%{opacity:0;transform:translate(15px,-8px) scale(.8)}}.body-anim{transform-origin:7.5px 15px;animation:attention-jump 4s infinite ease-in-out}.shadow-anim{transform-origin:7.5px 15.5px;animation:shadow-pulse 4s infinite ease-in-out}.eyes-look{transform-origin:7.5px 9px;animation:eye-track 4s infinite ease-in-out}.arm-l{transform-origin:1px 10px;animation:arm-wave-l 4s infinite ease-in-out}.arm-r{transform-origin:14px 10px;animation:arm-wave-r 4s infinite ease-in-out}.alert-pop{transform-origin:15px 0;animation:alert-flash 4s infinite ease-in-out;opacity:0}</style></defs><g transform="translate(15, 0) scale(-1, 1)"><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-anim"/><g fill="#FF3D00" class="alert-pop"><rect width="2" height="4" x="0" y="0"/><rect width="2" height="2" x="0" y="5"/></g><g class="body-anim"><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><g class="arm-l"><rect id="left-arm" width="2" height="2" x="0" y="9"/></g><g class="arm-r"><rect id="right-arm" width="2" height="2" x="13" y="9"/></g></g><g fill="#000" class="eyes-look"><rect id="left-eye" width="1" height="2" x="4" y="8"/><rect id="right-eye" width="1" height="2" x="10" y="8"/></g></g></g></svg>