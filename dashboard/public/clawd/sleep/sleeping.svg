<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes breathe-squash{0%,80%{transform:scale(1,1)}30%,40%{transform:scale(1.02,1.25)}}@keyframes shadow-pulse{0%,80%{transform:scaleX(1);opacity:.4}30%,40%{transform:scaleX(1.05);opacity:.5}}@keyframes float-1{0%{transform:translate(5px,8px) scale(.4);opacity:0}10%{opacity:1}30%{transform:translate(9px,4px) scale(.6)}50%{transform:translate(4px,0) scale(.8)}70%{transform:translate(8px,-4px) scale(1)}90%{opacity:.8}}@keyframes float-2{0%{transform:translate(8px,9px) scale(.3);opacity:0}10%{opacity:1}30%{transform:translate(5px,5px) scale(.5)}50%{transform:translate(9px,1px) scale(.7)}70%{transform:translate(6px,-3px) scale(.9)}90%{opacity:.8}}@keyframes float-3{0%{transform:translate(6px,7px) scale(.5);opacity:0}10%{opacity:1}30%{transform:translate(9px,3px) scale(.7)}50%{transform:translate(4px,-1px) scale(.9)}70%{transform:translate(8px,-5px) scale(1.1)}90%{opacity:.8}}.breathe{transform-origin:7.5px 15px;animation:breathe-squash 4.5s infinite ease-in-out}.shadow-breathe{transform-origin:7.5px 15.5px;animation:shadow-pulse 4.5s infinite ease-in-out}.z-particle{opacity:0}.z1{animation:float-1 6s infinite ease-in-out;animation-delay:0s}.z2{animation:float-2 6s infinite ease-in-out;animation-delay:2s}.z3{animation:float-3 6s infinite ease-in-out;animation-delay:4s}</style><g id="pixel-z"><rect width="4" height="1" x="0" y="0"/><rect width="1" height="1" x="2" y="1"/><rect width="1" height="1" x="1" y="2"/><rect width="4" height="1" x="0" y="3"/></g><g id="pixel-z-small"><rect width="3" height="1" x="0" y="0"/><rect width="1" height="1" x="1" y="1"/><rect width="3" height="1" x="0" y="2"/></g></defs><rect id="ground-shadow" width="17" height="1" x="-1" y="15" fill="#000" class="shadow-breathe"/><g class="zzz-particles"><use fill="#90A4AE" class="z-particle z1" href="#pixel-z"/><use fill="#B0BEC5" class="z-particle z2" href="#pixel-z-small"/><use fill="#CFD8DC" class="z-particle z3" href="#pixel-z"/></g><g class="breathe"><g fill="#DE886D"><rect id="outer-left-leg-up" width="1" height="1" x="3" y="9"/><rect id="inner-left-leg-up" width="1" height="1" x="5" y="9"/><rect id="inner-right-leg-up" width="1" height="1" x="9" y="9"/><rect id="outer-right-leg-up" width="1" height="1" x="11" y="9"/></g><g fill="#DE886D"><rect id="torso-sploot" width="13" height="5" x="1" y="10"/><rect id="left-arm-sploot" width="2" height="2" x="-1" y="13"/><rect id="right-arm-sploot" width="2" height="2" x="14" y="13"/></g><g fill="#000"><rect id="left-eye-shut" width="2" height=".4" x="3.5" y="12.5"/><rect id="right-eye-shut" width="2" height=".4" x="9.5" y="12.5"/></g></g></svg>