<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" shape-rendering="crispEdges" viewBox="-15 -25 45 45"><defs><style>@keyframes rest-shadow-form{0%{transform:scaleX(.556);opacity:.55}4%{transform:scaleX(.574);opacity:.548}14%{transform:scaleX(.61);opacity:.54}28%{transform:scaleX(.665);opacity:.522}42%{transform:scaleX(.74);opacity:.5}68%{transform:scaleX(.9);opacity:.45}86%{transform:scaleX(1.02);opacity:.41}}@keyframes rest-body-frame{0%{transform:scale(1.05,.95) translate(0,1px)}4%{transform:scale(1.058,.94) translate(0,1.1px)}14%{transform:scale(1.072,.915) translate(0,1.32px)}28%{transform:scale(1.09,.875) translate(0,1.68px)}40%{transform:scale(1.1,.84) translate(0,1.95px)}66%{transform:scale(1.05,.9) translate(0,1.05px)}84%{transform:scale(1.01,.98) translate(0,.22px)}}@keyframes rest-torso{0%{transform:translate(0,0) scale(1,1)}4%{transform:translate(-.02px,.08px) scale(1.004,.998)}14%{transform:translate(-.1px,.34px) scale(1.018,.985)}28%{transform:translate(-.26px,1.02px) scale(1.045,.94)}44%{transform:translate(-.4px,1.75px) scale(1.08,.9)}68%{transform:translate(-.8px,3.1px) scale(1.14,.8)}86%{transform:translate(-1.05px,3.95px) scale(1.19,.72)}}@keyframes rest-arm-l{0%{transform:translate(0,1px) rotate(-15deg)}4%{transform:translate(-.03px,1.08px) rotate(-14.5deg)}14%{transform:translate(-.11px,1.34px) rotate(-13deg)}28%{transform:translate(-.27px,1.98px) rotate(-9deg)}44%{transform:translate(-.45px,2.45px) rotate(-7deg)}68%{transform:translate(-.8px,3.35px) rotate(-2deg)}86%{transform:translate(-1.05px,4.05px) rotate(0deg)}}@keyframes rest-arm-r{0%{transform:translate(0,1px) rotate(15deg)}4%{transform:translate(.03px,1.08px) rotate(14.5deg)}14%{transform:translate(.11px,1.34px) rotate(13deg)}28%{transform:translate(.27px,1.98px) rotate(9deg)}44%{transform:translate(.45px,2.45px) rotate(7deg)}68%{transform:translate(.8px,3.35px) rotate(2deg)}86%{transform:translate(1.05px,4.05px) rotate(0deg)}}@keyframes rest-eye-l{0%{transform:scale(1,.1)}4%{transform:translate(0,.06px) scale(1.015,.1)}14%{transform:translate(0,.28px) scale(1.06,.1)}24%{transform:translate(0,.6px) scale(1.12,.1)}52%{transform:translate(-.15px,2.1px) scale(1.45,.12)}78%{transform:translate(-.35px,3.8px) scale(1.82,.17)}}@keyframes rest-eye-r{0%{transform:scale(1,.1)}4%{transform:translate(0,.06px) scale(1.015,.1)}14%{transform:translate(0,.28px) scale(1.06,.1)}24%{transform:translate(0,.6px) scale(1.12,.1)}52%{transform:translate(-.15px,2.1px) scale(1.45,.12)}78%{transform:translate(-.35px,3.8px) scale(1.82,.17)}}@keyframes rest-leg{0%{transform:translate(0,0) scale(1,1)}4%{transform:translate(0,-.03px) scale(1,.985)}14%{transform:translate(0,-.14px) scale(1,.93)}44%{transform:translate(0,-.4px) scale(1,.82)}68%{transform:translate(0,-1.4px) scale(1,.6)}84%{transform:translate(0,-2.4px) scale(1,.42)}}@keyframes sleep-breathe{0%,80%{transform:scale(1,1)}30%,40%{transform:scale(1.02,1.25)}}@keyframes sleep-shadow{0%,80%{transform:scaleX(1);opacity:.4}30%,40%{transform:scaleX(1.05);opacity:.5}}@keyframes float-1{0%{transform:translate(5px,8px) scale(.4);opacity:0}10%{opacity:1}30%{transform:translate(9px,4px) scale(.6)}50%{transform:translate(4px,0) scale(.8)}70%{transform:translate(8px,-4px) scale(1)}90%{opacity:.8}}@keyframes float-2{0%{transform:translate(8px,9px) scale(.3);opacity:0}10%{opacity:1}30%{transform:translate(5px,5px) scale(.5)}50%{transform:translate(9px,1px) scale(.7)}70%{transform:translate(6px,-3px) scale(.9)}90%{opacity:.8}}@keyframes float-3{0%{transform:translate(6px,7px) scale(.5);opacity:0}10%{opacity:1}30%{transform:translate(9px,3px) scale(.7)}50%{transform:translate(4px,-1px) scale(.9)}70%{transform:translate(8px,-5px) scale(1.1)}90%{opacity:.8}}.rest-shadow-breathe,.rest-shadow-form{transform-origin:7.5px 15.5px;animation:sleep-shadow 4.5s infinite ease-in-out 1s}.rest-shadow-form{animation:rest-shadow-form 1s linear forwards}.rest-breathe{transform-origin:7.5px 15px;animation:sleep-breathe 4.5s infinite ease-in-out 1s}.rest-body-frame{transform-origin:7.5px 13px;animation:rest-body-frame 1s linear forwards}.rest-torso{transform-origin:2px 6px;animation:rest-torso 1s linear forwards}.rest-arm-l{transform-origin:1px 10px;animation:rest-arm-l 1s linear forwards}.rest-arm-r{transform-origin:14px 10px;animation:rest-arm-r 1s linear forwards}.rest-eye-l{transform-origin:4px 8px;animation:rest-eye-l 1s linear forwards}.rest-eye-r{transform-origin:10px 8px;animation:rest-eye-r 1s linear forwards}.rest-leg{animation:rest-leg 1s linear forwards}.rest-leg.left-outer{transform-origin:3px 12px}.rest-leg.left-inner{transform-origin:5px 12px}.rest-leg.right-inner{transform-origin:9px 12px}.rest-leg.right-outer{transform-origin:11px 12px}.z-particle{opacity:0}.z1{animation:float-1 6s infinite ease-in-out 1s}.z2{animation:float-2 6s infinite ease-in-out 3s}.z3{animation:float-3 6s infinite ease-in-out 5s}</style><g id="pixel-z"><rect width="4" height="1" x="0" y="0"/><rect width="1" height="1" x="2" y="1"/><rect width="1" height="1" x="1" y="2"/><rect width="4" height="1" x="0" y="3"/></g><g id="pixel-z-small"><rect width="3" height="1" x="0" y="0"/><rect width="1" height="1" x="1" y="1"/><rect width="3" height="1" x="0" y="2"/></g></defs><g class="rest-shadow-breathe"><rect width="17" height="1" x="-1" y="15" fill="#000" class="rest-shadow-form" opacity=".4"/></g><use fill="#90A4AE" class="z-particle z1" href="#pixel-z"/><use fill="#B0BEC5" class="z-particle z2" href="#pixel-z-small"/><use fill="#CFD8DC" class="z-particle z3" href="#pixel-z"/><g class="rest-breathe"><g fill="#DE886D"><rect width="1" height="3" x="3" y="12" class="rest-leg left-outer"/><rect width="1" height="3" x="5" y="12" class="rest-leg left-inner"/><rect width="1" height="3" x="9" y="12" class="rest-leg right-inner"/><rect width="1" height="3" x="11" y="12" class="rest-leg right-outer"/></g><g class="rest-body-frame"><rect width="11" height="7" x="2" y="6" fill="#DE886D" class="rest-torso"/><g class="rest-arm-l"><rect width="2" height="2" x="0" y="9" fill="#DE886D"/></g><g class="rest-arm-r"><rect width="2" height="2" x="13" y="9" fill="#DE886D"/></g><g fill="#000"><rect width="1" height="2" x="4" y="8" class="rest-eye-l"/><rect width="1" height="2" x="10" y="8" class="rest-eye-r"/></g></g></g></svg>