<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes body-panic{0%,4%,82%{transform:translate(0,0)}10%,18%,36%{transform:translate(-1px,0)}24%,32%,40%{transform:translate(1px,0)}46%,72%{transform:translate(1px,-1px)}}@keyframes eyes-panic{0%,4%,82%{transform:translate(0,0)}10%,18%,36%{transform:translate(-2px,0)}24%,32%,40%{transform:translate(2px,0)}46%,72%{transform:translate(3px,-2px)}}@keyframes blink{0%,20%,24%,60%,64%,80%,84%{transform:scaleY(1)}22%,62%,82%{transform:scaleY(.1)}}@keyframes question-fade{0%,6%{opacity:0;transform:translate(-4px,4px) scale(.5)}12%,38%{opacity:1;transform:translate(-4px,0) scale(1)}44%{opacity:0;transform:translate(-4px,-4px) scale(1.2)}}@keyframes excl-fade{0%,42%{opacity:0;transform:translate(6px,0) scale(.5)}48%,72%{opacity:1;transform:translate(6px,-4px) scale(1)}80%{opacity:0;transform:translate(6px,-8px) scale(1.2)}}.body-react{animation:body-panic 3.5s 1 ease-in-out forwards}.eyes-react{animation:eyes-panic 3.5s 1 ease-in-out forwards}.eyes-blink{transform-origin:7.5px 9px;animation:blink 3s infinite linear}.exclamation-pop,.question-pop{transform-origin:center;opacity:0}.question-pop{animation:question-fade 3.5s 1 ease-in-out forwards}.exclamation-pop{animation:excl-fade 3.5s 1 ease-in-out forwards}</style></defs><rect width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g fill="#DE886D"><rect width="1" height="4" x="3" y="11"/><rect width="1" height="4" x="5" y="11"/><rect width="1" height="4" x="9" y="11"/><rect width="1" height="4" x="11" y="11"/></g><g class="body-react"><g fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><rect width="2" height="2" x="0" y="9"/><rect width="2" height="2" x="13" y="9"/></g><g class="eyes-react"><g fill="#000" class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></g><g fill="#FFF" class="question-pop"><rect width="2" height="1" x="1" y="0"/><rect width="1" height="1" x="0" y="1"/><rect width="1" height="2" x="3" y="1"/><rect width="1" height="1" x="2" y="3"/><rect width="1" height="1" x="1" y="4"/><rect width="1" height="1" x="1" y="6"/></g><g fill="#0082FC" class="exclamation-pop"><rect width="1" height="4" x="1" y="0"/><rect width="1" height="1" x="1" y="5"/></g></svg>