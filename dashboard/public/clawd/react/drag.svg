<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes sway{0%{transform:rotate(-3deg) translate(-1px,0)}}@keyframes dangle-1{0%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-25deg) scaleY(.7)}}@keyframes dangle-2{0%{transform:rotate(-25deg) scaleY(.7)}50%{transform:rotate(0deg) scaleY(1)}}@keyframes flail-l{0%{transform:rotate(45deg)}}@keyframes flail-r{0%{transform:rotate(-45deg)}}@keyframes shadow-pulse{0%{transform:scale(.7);opacity:.2}}.body-sway{transform-origin:7.5px 6px;animation:sway 1.2s infinite alternate ease-in-out}.leg-dangle-1,.leg-dangle-2{animation:dangle-1 .5s infinite linear;transform-origin:top center;transform-box:fill-box}.leg-dangle-2{animation:dangle-2 .5s infinite linear}.arm-flail-l,.arm-flail-r{transform-box:fill-box;transform-origin:100% 50%;animation:flail-l .2s infinite alternate ease-in-out}.arm-flail-r{transform-origin:0 50%;animation:flail-r .2s infinite alternate ease-in-out}.shadow-lift{transform-origin:7.5px 15.5px;animation:shadow-pulse 1.2s infinite alternate ease-in-out}</style></defs><rect width="9" height="1" x="3" y="15" fill="#000" class="shadow-lift"/><g class="body-sway"><g fill="#DE886D"><rect width="1" height="2" x="3" y="13" class="leg-dangle-1"/><rect width="1" height="2" x="5" y="13" class="leg-dangle-2"/><rect width="1" height="2" x="9" y="13" class="leg-dangle-1"/><rect width="1" height="2" x="11" y="13" class="leg-dangle-2"/></g><g fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><g class="arm-flail-l"><rect width="2" height="2" x="0" y="9"/></g><g class="arm-flail-r"><rect width="2" height="2" x="13" y="9"/></g></g><g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width=".7"><polyline points="4 8 5.5 9 4 10"/><polyline points="11 8 9.5 9 11 10"/></g></g></svg>