<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes arm-l-return{0%,8%,84%{transform:none}16%,56%{transform:translate(-1px,-2px) rotate(15deg)}}@keyframes body-look-l{0%,8%,84%{transform:translate(0,0)}16%,56%{transform:translate(-2px,0) rotate(-2deg)}}@keyframes eyes-look-l{0%,8%,84%{transform:translate(0,0)}16%,56%{transform:translate(-3px,0)}}@keyframes blink{0%,13%,17%,80%,84%{transform:scaleY(1)}15%,82%{transform:scaleY(.1)}}@keyframes question-l{0%,12%{opacity:0;transform:translate(-6px,6px) scale(.5)}22%,48%{opacity:1;transform:translate(-8px,-2px) scale(1)}64%{opacity:0;transform:translate(-8px,-8px) scale(1.2)}}.body-react{transform-origin:7.5px 15px;animation:body-look-l 2.5s 1 ease-in-out forwards}.eyes-react{animation:eyes-look-l 2.5s 1 ease-in-out forwards}.eyes-blink{transform-origin:7.5px 9px;animation:blink 3s infinite linear}.question-pop{transform-origin:center;animation:question-l 2.5s 1 ease-in-out forwards;opacity:0}.arm-l-react{animation:arm-l-return 2.5s 1 ease-in-out forwards}</style><g id="pixel-question"><rect width="2" height="1" x="1" y="0"/><rect width="1" height="1" x="0" y="1"/><rect width="1" height="2" x="3" y="1"/><rect width="1" height="1" x="2" y="3"/><rect width="1" height="1" x="1" y="4"/><rect width="1" height="1" x="1" y="6"/></g></defs><rect width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g fill="#DE886D"><rect width="1" height="2" x="3" y="13"/><rect width="1" height="2" x="5" y="13"/><rect width="1" height="2" x="9" y="13"/><rect width="1" height="2" x="11" y="13"/></g><g class="body-react"><g fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><g class="arm-l-react"><rect width="2" height="2" x="0" y="9"/></g><rect width="2" height="2" x="13" y="9"/></g><g class="eyes-react"><g fill="#000" class="eyes-blink"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></g><g fill="#40C4FF" class="question-pop"><use href="#pixel-question"/></g></svg>