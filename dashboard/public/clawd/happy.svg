<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes bounce{0%,15%,85%{transform:translateY(0) scaleY(1)}20%,80%{transform:translateY(0) scaleY(.85)}40%,60%{transform:translateY(-10px) scaleY(1.05)}50%{transform:translateY(-12px) scaleY(1)}}@keyframes shadow{0%,15%,85%{transform:scale(1);opacity:.5}20%,80%{transform:scale(1.1);opacity:.6}40%,60%{transform:scale(.6);opacity:.2}50%{transform:scale(.5);opacity:.15}}@keyframes wave-l{0%{transform:rotate(45deg)}}@keyframes wave-r{0%{transform:rotate(-45deg)}}@keyframes blink{0%,46%,54%{transform:scaleY(1)}50%{transform:scaleY(.1)}}@keyframes flash-center{0%,30%{opacity:0}10%{opacity:1}}@keyframes flash-outer{0%,40%{opacity:0}20%{opacity:1}}.bounce-anim,.shadow-anim{transform-box:fill-box;transform-origin:50% 100%;animation:bounce 1s infinite ease-in-out}.shadow-anim{transform-origin:50% 50%;animation:shadow 1s infinite ease-in-out}.arm-l{transform-origin:100% 50%;animation:wave-l .15s infinite alternate ease-in-out}.arm-l,.arm-r,.eyes-blink{transform-box:fill-box}.arm-r{transform-origin:0 50%;animation:wave-r .15s infinite alternate ease-in-out}.eyes-blink{transform-origin:50% 50%;animation:blink 2s infinite linear}.spark-center,.spark-outer{opacity:0;animation:flash-center 1.5s infinite step-end;animation-delay:var(--delay, 0s)}.spark-outer{animation:flash-outer 1.5s infinite step-end}</style><g id="px-sparkle"><rect width="1" height="1" x="-.5" y="-.5" class="spark-center"/><path d="M -0.5,-1.5 h1 v1 h-1 z M -0.5,0.5 h1 v1 h-1 z M -1.5,-0.5 h1 v1 h-1 z M 0.5,-0.5 h1 v1 h-1 z" class="spark-outer"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-anim"/><g class="sparkles"><use style="--delay:0.0s" x="-4" y="-2" fill="gold" href="#px-sparkle"/><use style="--delay:0.3s" x="18" y="-4" fill="#FFA000" href="#px-sparkle"/><use style="--delay:0.6s" x="20" y="10" fill="#FFF59D" href="#px-sparkle"/><use style="--delay:0.9s" x="-6" y="12" fill="#FFC107" href="#px-sparkle"/><use style="--delay:1.2s" x="7" y="-8" fill="#FFF59D" href="#px-sparkle"/><use style="--delay:0.7s" x="-2" y="6" fill="gold" href="#px-sparkle"/></g><g class="bounce-anim"><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><g class="arm-l"><rect id="left-arm" width="2" height="2" x="0" y="9"/></g><g class="arm-r"><rect id="right-arm" width="2" height="2" x="13" y="9"/></g></g><g fill="#000" class="eyes-blink"><rect id="left-eye" width="1" height="2" x="4" y="8"/><rect id="right-eye" width="1" height="2" x="10" y="8"/></g></g></svg>