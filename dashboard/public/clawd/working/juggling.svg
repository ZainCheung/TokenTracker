<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes rock{0%{transform:rotate(-5deg)}}@keyframes arm-jl{0%{transform:rotate(60deg)}}@keyframes arm-jr{0%{transform:rotate(-10deg)}}@keyframes dart{0%{transform:translate(-2px,-2px)}25%{transform:translate(0,-3px)}50%{transform:translate(2px,-2px)}75%{transform:translate(0,0)}}@keyframes juggle{0%{transform:translate(0,9px) rotate(0deg)}25%{transform:translate(8px,0) rotate(90deg)}50%{transform:translate(15px,9px) rotate(180deg)}75%{transform:translate(8px,4px) rotate(270deg)}}.body-rock{transform-origin:7.5px 15px;animation:rock .6s infinite alternate ease-in-out}.arm-juggle-l{transform-origin:1px 10px;animation:arm-jl .6s infinite alternate ease-in-out}.arm-juggle-r{transform-origin:14px 10px;animation:arm-jr .6s infinite alternate ease-in-out}.eyes-dart{animation:dart 1.2s infinite}.packet{animation:juggle 1.2s infinite linear}.p1{animation-delay:0s;fill:#ff5252}.p2{animation-delay:-.4s;fill:#ffc107}.p3{animation-delay:-.8s;fill:#4caf50}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g class="packets"><rect width="2" height="2" x="-1" y="-1" class="packet p1"/><rect width="2" height="2" x="-1" y="-1" class="packet p2"/><rect width="2" height="2" x="-1" y="-1" class="packet p3"/></g><g class="body-rock"><g id="legs" fill="#DE886D"><rect width="1" height="2" x="3" y="13"/><rect width="1" height="2" x="5" y="13"/><rect width="1" height="2" x="9" y="13"/><rect width="1" height="2" x="11" y="13"/></g><g id="body-color-group" fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><g class="arm-juggle-l"><rect width="2" height="2" x="0" y="9"/></g><g class="arm-juggle-r"><rect width="2" height="2" x="13" y="9"/></g></g><g fill="#000" class="eyes-dart"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g></g></svg>