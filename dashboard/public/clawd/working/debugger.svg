<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes hunch-walk{0%{transform:translate(-2px,1px) rotate(2deg)}}@keyframes shadow-shift{0%{transform:translateX(-2px) scale(.9);opacity:.4}}@keyframes search-glass{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(-3deg) scale(1.05)}}@keyframes sneak-1{0%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-25deg) scaleY(.7)}}@keyframes sneak-2{0%{transform:rotate(-25deg) scaleY(.7)}50%{transform:rotate(0deg) scaleY(1)}}.body-hunch{transform-origin:7.5px 15px;animation:hunch-walk 2s infinite alternate ease-in-out}.magnifying-glass{transform-origin:14px 10px;animation:search-glass 3s infinite ease-in-out}.leg-1,.leg-2{animation:sneak-1 .5s infinite linear;transform-origin:top center;transform-box:fill-box}.leg-2{animation:sneak-2 .5s infinite linear}.shadow-sneak{transform-origin:7.5px 15.5px;animation:shadow-shift 2s infinite alternate ease-in-out}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-sneak" opacity=".5"/><g class="body-hunch"><g id="legs" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13" class="leg-1"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13" class="leg-2"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13" class="leg-1"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13" class="leg-2"/></g><g id="body-color-group" fill="#DE886D"><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="2" x="0" y="9" transform="translate(1, -1) rotate(15 1 10)"/></g><g fill="#000"><rect id="left-eye" width="1" height="1" x="4" y="8.5"/></g><g class="magnifying-glass"><rect id="right-arm" width="2" height="2" x="13" y="9" fill="#DE886D"/><g id="glass" transform="translate(13.5, 9.5)"><polygon fill="#795548" points=".5 1.5 1.5 .5 -1 -2 -2 -1"/><rect width="6" height="6" x="-6" y="-5" fill="#546E7A" rx="2"/><rect width="2" height="3" x="-4" y="-3.5" fill="#000"/><rect width="5" height="5" x="-5.5" y="-4.5" fill="#E0F7FA" opacity=".6" rx="1.5"/><rect width="1.5" height="1.5" x="-4.5" y="-3.5" fill="#FFF" opacity=".8"/></g></g></g></svg>