<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes push-strain{0%{transform:rotate(12deg) scale(1,.95)}}@keyframes shadow-strain{0%{transform:translateX(1px) scaleX(1);opacity:.5}}@keyframes block-shake{0%{transform:translate(0,0)}}@keyframes run-1{0%{transform:rotate(0deg) scaleY(1)}50%{transform:rotate(-25deg) scaleY(.7)}}@keyframes run-2{0%{transform:rotate(-25deg) scaleY(.7)}50%{transform:rotate(0deg) scaleY(1)}}@keyframes sweat-fly{0%{transform:translate(0,0) scale(0);opacity:0}10%{transform:translate(0,0) scale(1);opacity:1}40%{transform:translate(-8px,-4px) scale(.8);opacity:0}}.body-push{transform-origin:7.5px 15px;animation:push-strain .6s infinite alternate ease-in-out}.data-block{animation:block-shake .1s infinite alternate}.leg{transform-box:fill-box;transform-origin:top center}.leg-1{animation:run-1 .3s infinite linear}.leg-2{animation:run-2 .3s infinite linear}.sweat{opacity:0;animation:sweat-fly 2s infinite cubic-bezier(.25,.1,.25,1)}.shadow-push{transform-origin:7.5px 15.5px;animation:shadow-strain .6s infinite alternate ease-in-out}</style></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-push" opacity=".5"/><rect id="block-shadow" width="10" height="1" x="14" y="15" fill="#000" opacity=".4"/><g class="data-block" transform="translate(14, 5)"><rect width="10" height="10" x="0" y="0" fill="#90A4AE"/><rect width="8" height="8" x="1" y="1" fill="#CFD8DC"/><rect width="2" height="2" x="2" y="2" fill="#0082FC"/><rect width="2" height="2" x="6" y="2" fill="#FFC107"/><rect width="6" height="2" x="2" y="6" fill="#B0BEC5"/></g><g class="body-push"><g><g fill="#40C4FF" class="sweat" transform="translate(1, 4)"><rect width="1.5" height="1.5" x="0" y="1"/><rect width="1" height="1" x=".25" y="0"/></g></g><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13" class="leg leg-1"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13" class="leg leg-2"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13" class="leg leg-1"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13" class="leg leg-2"/><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="2" x="0" y="9" transform="translate(11, 0) rotate(-15 1 10)"/><rect id="right-arm" width="2" height="2" x="13" y="9" transform="translate(0, -1) rotate(-15 14 10)"/></g><g fill="#000"><rect id="left-eye" width="1" height="1" x="8" y="8.5"/><rect id="right-eye" width="1" height="2.5" x="12" y="7"/></g></g></svg>