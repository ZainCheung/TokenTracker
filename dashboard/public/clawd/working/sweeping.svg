<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes sweep-lean{0%{transform:rotate(5deg) translate(1px,0)}50%{transform:rotate(15deg) translate(3px,1px)}}@keyframes sweep-arm{0%{transform:rotate(0deg)}50%{transform:rotate(-20deg)}}@keyframes sweep-broom{0%{transform:rotate(10deg)}50%{transform:rotate(30deg) translate(2px,-1px)}}@keyframes sweep-dust{0%,40%{transform:translate(17px,14px) scale(0);opacity:0}50%{transform:translate(19px,14px) scale(1);opacity:1}}.body-sweep{transform-origin:7.5px 15px;animation:sweep-lean 1.5s infinite ease-in-out}.arm-sweep{transform-origin:14px 10px;animation:sweep-arm 1.5s infinite ease-in-out}.broom{transform-origin:13.5px 14px;animation:sweep-broom 1.5s infinite ease-in-out}.dust{opacity:0;animation:sweep-dust 1.5s infinite ease-out}.d1{animation-delay:.2s}</style></defs><g transform="translate(15, 0) scale(-1, 1)"><rect id="ground-shadow" width="13" height="1" x="3" y="15" fill="#000" opacity=".5"/><g class="body-sweep"><g id="legs" fill="#DE886D"><rect width="1" height="2" x="3" y="13"/><rect width="1" height="2" x="5" y="13"/><rect width="1" height="2" x="9" y="13"/><rect width="1" height="2" x="11" y="13"/></g><g id="body-color-group" fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><rect width="2" height="2" x="0" y="9" transform="translate(6, 1) rotate(-15 1 10)"/><g class="arm-sweep"><rect width="2" height="2" x="13" y="9"/></g></g><g fill="#000"><rect width="1" height="2" x="5" y="8"/><rect width="1" height="2" x="11" y="8"/></g></g><g class="broom"><rect width="1" height="10" x="13.5" y="4" fill="#795548"/><rect width="4" height="2" x="12" y="14" fill="#FFC107"/></g><g fill="#9E9E9E" class="dust"><rect width="1.5" height="1.5" x="0" y="0"/></g><g fill="#B0BEC5" class="dust d1"><rect width="1" height="1" x="0" y="0"/></g></g></svg>