<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes text-pulse{0%{opacity:.15}50%{opacity:1}}@keyframes shake{0%{transform:translate(-.3px,0) rotate(-.5deg)}}@keyframes shadow-vib{0%{transform:scaleX(.98)}}@keyframes tap-fast{0%{transform:rotate(-125deg)}50%{transform:rotate(-145deg)}}@keyframes focus-blink{0%,70%,78%{transform:scaleY(1)}74%{transform:scaleY(.1)}}@keyframes spark-rise{0%{transform:translate(0,0) scale(1);opacity:0}15%{opacity:1}}@keyframes dot-pulse{0%{opacity:.2}25%,75%{opacity:1}}@keyframes steam-rise{0%{transform:translate(0,0) scale(.8);opacity:0}20%{opacity:.6}}.body-shake{transform-origin:7.5px 15px;animation:shake .15s infinite alternate ease-in-out}.shadow-shake{transform-origin:7.5px 15.5px;animation:shadow-vib .15s infinite alternate ease-in-out}.arm-tap-fast{transform-origin:14px 10px;animation:tap-fast .8s infinite ease-in-out}.eyes-focus{transform-origin:7.5px 9px;animation:focus-blink 2s infinite}.spark{opacity:0;animation:spark-rise 1.2s infinite ease-out}.sp1{animation-delay:0s}.sp2{animation-delay:.3s}.sp3{animation-delay:.6s}.sp4{animation-delay:.9s}.load-dot{opacity:0;animation:dot-pulse 1.6s infinite}.d1{animation-delay:0s}.d2{animation-delay:.4s}.d3{animation-delay:.8s}.steam{opacity:0;animation:steam-rise 2s infinite ease-out}.st1{animation-delay:0s}.st2{animation-delay:.7s}.st3{animation-delay:1.4s}.ul{animation:text-pulse 1s infinite ease-in-out}.ul0{animation-delay:0s}.ul1{animation-delay:.1s}.ul2{animation-delay:.2s}.ul3{animation-delay:.3s}.ul4{animation-delay:.4s}.ul5{animation-delay:.5s}.ul6{animation-delay:.6s}.ul7{animation-delay:.7s}.ul8{animation-delay:.8s}.ul9{animation-delay:.9s}</style></defs><rect width="9" height="1" x="3" y="15" fill="#000" class="shadow-shake" opacity=".5"/><g fill="gold"><rect width="1" height="1" x="10" y="2" class="spark sp1"/><rect width="1" height="1" x="6" y="0" class="spark sp2"/><rect width="1" height="1" x="3" y="1" class="spark sp3"/><rect width="1" height="1" x="8" y="-1" class="spark sp4"/></g><g fill="#AAA" opacity=".5"><g class="steam st1"><rect width="2" height="1" x="5" y="3" rx=".5"/><rect width="1" height="1" x="4" y="2" rx=".5"/></g><g class="steam st2"><rect width="2" height="1" x="9" y="2" rx=".5"/><rect width="1" height="1" x="10" y="1" rx=".5"/></g><g class="steam st3"><rect width="1" height="1" x="7" y="3" rx=".5"/><rect width="2" height="1" x="6" y="2" rx=".5"/></g></g><g fill="#FF6B35"><rect width="1" height="1" x="4" y="4" class="load-dot d1"/><rect width="1" height="1" x="7" y="4" class="load-dot d2"/><rect width="1" height="1" x="10" y="4" class="load-dot d3"/></g><g transform="translate(15, 0) scale(-1, 1)"><g id="legs" fill="#DE886D"><rect width="1" height="2" x="3" y="13"/><rect width="1" height="2" x="5" y="13"/><rect width="1" height="2" x="9" y="13"/><rect width="1" height="2" x="11" y="13"/></g><g class="body-shake"><g fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><rect width="3" height="2" x="0" y="9" transform="rotate(25 1 10)"/><g class="arm-tap-fast"><rect width="2" height="2" x="13" y="9"/></g></g><g fill="#000" class="eyes-focus"><rect width="1" height="2" x="5" y="7"/><rect width="1" height="2" x="11" y="7"/></g></g></g><text x="7.5" y="0" font-family="'Söhne', 'Helvetica Neue', Arial, sans-serif" font-size="3.2" font-weight="600" letter-spacing=".2" text-anchor="middle"><tspan fill="#FF5252" class="ul ul0">u</tspan><tspan fill="#FF9800" class="ul ul1">l</tspan><tspan fill="#FFC107" class="ul ul2">t</tspan><tspan fill="#4CAF50" class="ul ul3">r</tspan><tspan fill="#2196F3" class="ul ul4">a</tspan><tspan fill="#9C27B0" class="ul ul5">t</tspan><tspan fill="#FF5252" class="ul ul6">h</tspan><tspan fill="#FF9800" class="ul ul7">i</tspan><tspan fill="#4CAF50" class="ul ul8">n</tspan><tspan fill="#2196F3" class="ul ul9">k</tspan></text></svg>