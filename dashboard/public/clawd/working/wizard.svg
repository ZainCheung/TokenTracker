<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes float-body{0%{transform:translateY(0)}50%{transform:translateY(-2px)}}@keyframes wave-wand{0%{transform:rotate(-20deg)}50%{transform:rotate(-120deg)}}@keyframes wave-magic{0%{transform:rotate(20deg)}50%{transform:rotate(120deg)}}@keyframes blink-magic{0%,40%{transform:scaleY(.1)}45%,95%{transform:scaleY(1)}}@keyframes sparkle-magic{0%{transform:translate(14px,4px) scale(0) rotate(0deg);opacity:0}20%{opacity:1}}.body-magic{transform-origin:7.5px 15px;animation:float-body 3s infinite ease-in-out}.arm-wand{transform-origin:14px 10px;animation:wave-wand 3s infinite ease-in-out}.arm-l-magic{transform-origin:1px 10px;animation:wave-magic 3s infinite ease-in-out}.eyes-magic{animation:blink-magic 3s infinite}.magic-star{opacity:0;animation:sparkle-magic 2s infinite ease-out}.s1{animation-delay:0s;fill:gold}.s2{animation-delay:.5s;fill:#40c4ff}.s3{animation-delay:1s;fill:#b388ff}.s4{animation-delay:1.5s;fill:#ff8a80}</style><g id="star"><polygon points="0 -2 .5 -.5 2 0 .5 .5 0 2 -.5 .5 -2 0 -.5 -.5"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" opacity=".4"/><g><use class="magic-star s1" href="#star"/><use class="magic-star s2" href="#star" transform="translate(-10, 0)"/><use class="magic-star s3" href="#star" transform="translate(5, -5)"/><use class="magic-star s4" href="#star" transform="translate(-5, -10)"/></g><g class="body-magic"><g id="legs" fill="#DE886D"><rect width="1" height="2" x="3" y="13"/><rect width="1" height="2" x="5" y="13"/><rect width="1" height="2" x="9" y="13"/><rect width="1" height="2" x="11" y="13"/></g><g id="body-color-group" fill="#DE886D"><rect width="11" height="7" x="2" y="6"/><g class="arm-l-magic"><rect width="2" height="2" x="0" y="9"/></g></g><g fill="#000" class="eyes-magic" transform-origin="7.5px 9px"><rect width="1" height="2" x="4" y="8"/><rect width="1" height="2" x="10" y="8"/></g><g transform="translate(7.5, 6)"><polygon fill="#673AB7" points="-4 0 4 0 0 -6"/><rect width="10" height="1" x="-5" y="0" fill="#512DA8"/><polygon fill="#FFC107" points="0 -3 .5 -2.5 1.5 -2.5 .75 -1.75 1 -.5 0 -1.25 -1 -.5 -.75 -1.75 -1.5 -2.5 -.5 -2.5"/></g><g fill="#DE886D" class="arm-wand"><rect width="2" height="2" x="13" y="9"/><rect width="1" height="6" x="13.5" y="4" fill="#8D6E63"/><rect width="1" height="1" x="13.5" y="4" fill="gold"/></g></g></svg>