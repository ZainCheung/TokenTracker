<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes sway{0%{transform:rotate(0deg) translate(0,0)}25%{transform:rotate(-3deg) translate(-1px,0)}75%{transform:rotate(3deg) translate(1px,0)}}@keyframes shadow-shift{0%{transform:translate(0,0)}25%{transform:translate(-1px,0)}75%{transform:translate(1px,0)}}@keyframes tap-chin{0%{transform:rotate(-125deg)}}@keyframes blink-think{0%,46%,54%{transform:scaleY(1)}50%{transform:scaleY(.1)}}@keyframes load-dot-1{0%,20%{opacity:0}21%{opacity:1}}@keyframes load-dot-2{0%,40%{opacity:0}41%{opacity:1}}@keyframes load-dot-3{0%,60%{opacity:0}61%{opacity:1}}.body-sway{transform-origin:7.5px 15px;animation:sway 4s infinite ease-in-out}.shadow-sway{transform-origin:7.5px 15.5px;animation:shadow-shift 4s infinite ease-in-out}.arm-tap{transform-origin:14px 10px;animation:tap-chin .8s infinite alternate ease-in-out}.eyes-think{transform-origin:7.5px 7px;animation:blink-think 4s infinite}.dot{opacity:0}.d1{animation:load-dot-1 2s infinite}.d2{animation:load-dot-2 2s infinite}.d3{animation:load-dot-3 2s infinite}</style></defs><g><g class="think-bubble"><g fill="#FFF" opacity=".9" transform="translate(-3, -7)"><rect width="8" height="7" x="2" y="1"/><rect width="10" height="5" x="1" y="2"/><rect width="6" height="9" x="3" y="0"/><rect width="2" height="2" x="8" y="7"/><rect width="1" height="1" x="10" y="9"/></g><g fill="#0082FC" transform="translate(-3, -7)"><rect width="1" height="1" x="2.5" y="4" class="dot d1"/><rect width="1" height="1" x="5.5" y="4" class="dot d2"/><rect width="1" height="1" x="8.5" y="4" class="dot d3"/></g></g></g><g transform="translate(15, 0) scale(-1, 1)"><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-sway" opacity=".5"/><g class="body-sway"><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="3" height="2" x="0" y="9" transform="rotate(25 1 10)"/><g class="arm-tap"><rect id="right-arm" width="2" height="2" x="13" y="9"/></g></g><g fill="#000" class="eyes-think"><rect id="left-eye" width="1" height="2" x="5" y="7"/><rect id="right-eye" width="1" height="2" x="11" y="7"/></g></g></g></svg>