<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes carry-strain{0%{transform:translateY(1px) scale(1.05,.95)}}@keyframes shadow-strain{0%{transform:scale(1.1);opacity:.6}}@keyframes block-shake{0%{transform:translate(0,0) rotate(-.5deg)}}@keyframes tremble-1{0%{transform:translateX(0)}50%{transform:translateX(-.5px)}}@keyframes tremble-2{0%{transform:translateX(0)}50%{transform:translateX(.5px)}}@keyframes sweat-fly{0%{transform:translate(0,0) scale(0);opacity:0}10%{transform:translate(0,0) scale(1);opacity:1}40%{transform:translate(-8px,-4px) scale(.8);opacity:0}}.body-carry{transform-origin:7.5px 15px;animation:carry-strain .15s infinite alternate ease-in-out}.data-block{animation:block-shake .15s infinite alternate ease-in-out}.leg{transform-box:fill-box;transform-origin:top center}.leg-1{animation:tremble-1 .1s infinite linear}.leg-2{animation:tremble-2 .1s infinite linear}.sweat{opacity:0;animation:sweat-fly 2s infinite cubic-bezier(.25,.1,.25,1)}.shadow-carry{transform-origin:7.5px 15.5px;animation:shadow-strain .15s infinite alternate ease-in-out}</style></defs><g transform="translate(15, 0) scale(-1, 1)"><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-carry" opacity=".5"/><g class="body-carry"><g class="data-block" transform="translate(1, -5)"><rect width="13" height="9" x="0" y="0" fill="#90A4AE"/><rect width="11" height="7" x="1" y="1" fill="#CFD8DC"/><rect width="2" height="2" x="2" y="2" fill="#0082FC"/><rect width="2" height="2" x="9" y="2" fill="#FFC107"/><rect width="7" height="2" x="3" y="5" fill="#B0BEC5"/></g><g><g fill="#40C4FF" class="sweat" transform="translate(-1, 5)"><rect width="1.5" height="1.5" x="0" y="1"/><rect width="1" height="1" x=".25" y="0"/></g></g><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13" class="leg leg-1"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13" class="leg leg-2"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13" class="leg leg-1"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13" class="leg leg-2"/><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="4" x="0" y="4"/><rect id="right-arm" width="2" height="4" x="13" y="4"/></g><g fill="#000"><rect id="left-eye" width="1" height="1" x="4" y="6.5"/><rect id="right-eye" width="1" height="2" x="10" y="6"/></g></g></g></svg>