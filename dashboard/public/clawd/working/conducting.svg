<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes bob{0%{transform:translateY(0) scale(1,1)}50%{transform:translateY(1.5px) scale(1.02,.98)}}@keyframes shadow-soft{0%{transform:scale(1);opacity:.4}50%{transform:scale(1.05);opacity:.5}}@keyframes conduct-l{0%{transform:rotate(15deg)}50%{transform:rotate(85deg)}}@keyframes conduct-r{0%{transform:rotate(-85deg)}50%{transform:rotate(-15deg)}}@keyframes stream-flow{0%{transform:translate(-2px,6px) scale(0);opacity:0}15%{transform:translate(0,1px) scale(1);opacity:1}50%{transform:translate(7.5px,-3px) scale(1.5);opacity:1}85%{transform:translate(15px,1px) scale(1);opacity:1}}.body-bob{transform-origin:7.5px 15px;animation:bob 2s infinite ease-in-out}.shadow-bob{transform-origin:7.5px 15.5px;animation:shadow-soft 2s infinite ease-in-out}.arm-l-conduct{transform-origin:1px 10px;animation:conduct-l 2s infinite ease-in-out}.arm-r-conduct{transform-origin:14px 10px;animation:conduct-r 2s infinite ease-in-out}.pixel-stream{opacity:0;animation:stream-flow 2s infinite linear}.p1{animation-delay:0s;color:#0082fc}.p2{animation-delay:.4s;color:#ffc107}.p3{animation-delay:.8s;color:#ff5252}.p4{animation-delay:1.2s;color:#4caf50}.p5{animation-delay:1.6s;color:#9c27b0}</style><g id="data-pixel"><rect width="1.5" height="1.5" x="0" y="0" fill="currentColor"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-bob"/><g><use class="pixel-stream p1" href="#data-pixel"/><use class="pixel-stream p2" href="#data-pixel"/><use class="pixel-stream p3" href="#data-pixel"/><use class="pixel-stream p4" href="#data-pixel"/><use class="pixel-stream p5" href="#data-pixel"/></g><g class="body-bob"><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><g class="arm-l-conduct"><rect id="left-arm" width="2" height="2" x="0" y="9"/></g><g class="arm-r-conduct"><rect id="right-arm" width="2" height="2" x="13" y="9"/></g></g><g fill="#000"><rect id="left-eye-happy" width="2" height=".5" x="3.5" y="8.5"/><rect id="right-eye-happy" width="2" height=".5" x="9.5" y="8.5"/></g></g></svg>