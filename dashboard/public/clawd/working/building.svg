<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes hammer-bounce{0%,45%,70%{transform:scale(1,1) translateY(0)}30%{transform:scale(.95,1.05) translateY(-2px)}50%{transform:scale(1.15,.85) translateY(2px)}}@keyframes shadow-impact{0%,45%,70%{transform:scale(1);opacity:.5}30%{transform:scale(.8);opacity:.3}50%{transform:scale(1.3);opacity:.8}}@keyframes arm-rest{0%{transform:rotate(0deg)}30%{transform:rotate(15deg)}50%{transform:rotate(-5deg)}}@keyframes hammer-swing{0%,70%{transform:rotate(15deg)}30%{transform:rotate(-45deg)}45%{transform:rotate(40deg)}50%{transform:rotate(125deg)}}@keyframes hammer-eyes{0%,40%,65%{transform:scaleY(1)}48%,60%{transform:scaleY(.1)}}@keyframes metal-glow{0%,49%{fill:#ff5252}50%,60%{fill:#fff59d}}@keyframes sweat-fly{0%{transform:translate(0,0) scale(0);opacity:0}30%{transform:translate(0,0) scale(1);opacity:1}80%{transform:translate(-6px,-6px) scale(.8);opacity:0}}@keyframes spark-1{0%,49%{transform:translate(0,0) scale(0);opacity:0}50%{transform:translate(0,0) scale(1);opacity:1}70%{transform:translate(4px,-6px) scale(0);opacity:0}}@keyframes spark-2{0%,49%{transform:translate(0,0) scale(0);opacity:0}50%{transform:translate(0,0) scale(1);opacity:1}70%{transform:translate(7px,-1px) scale(0);opacity:0}}@keyframes spark-3{0%,49%{transform:translate(0,0) scale(0);opacity:0}50%{transform:translate(0,0) scale(1);opacity:1}70%{transform:translate(3px,3px) scale(0);opacity:0}}.body-bounce{transform-origin:7.5px 15px;animation:hammer-bounce 1s infinite}.shadow-pulse{transform-origin:7.5px 15.5px;animation:shadow-impact 1s infinite}.arm-l-rest{transform-origin:2px 10px;animation:arm-rest 1s infinite}.arm-hammer{transform-origin:14px 10px;animation:hammer-swing 1s infinite}.eyes-blink{transform-origin:7.5px 9px;animation:hammer-eyes 1s infinite}.spark{opacity:0}.s1{animation:spark-1 1s infinite}.s2{animation:spark-2 1s infinite}.s3{animation:spark-3 1s infinite}.sweat{opacity:0;animation:sweat-fly 1s infinite cubic-bezier(.25,.1,.25,1)}.hot-metal{animation:metal-glow 1s infinite}</style><g id="pixel-spark"><rect width="1" height="1" x="0" y="0"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" class="shadow-pulse"/><rect id="work-shadow" width="7" height="1" x="16" y="15" fill="#000" opacity=".4"/><g id="work-piece" transform="translate(17, 13)"><rect width="5" height="1" x="0" y="2" fill="#546E7A"/><rect width="3" height="2" x="1" y="0" fill="#78909C"/><rect width="2" height="1" x="1.5" y="-.5" class="hot-metal"/></g><g fill="#FFC107" transform="translate(19, 12.5)"><use class="spark s1" href="#pixel-spark"/><use class="spark s2" href="#pixel-spark"/><use class="spark s3" href="#pixel-spark"/></g><g class="body-bounce"><g><g fill="#40C4FF" class="sweat" transform="translate(1, 8)"><rect width="1.5" height="1.5" x="0" y="1"/><rect width="1" height="1" x=".25" y="0"/></g></g><g id="hard-hat"><rect width="2" height="1" x="4" y="1" fill="#FBC02D"/><rect width="2" height="1" x="9" y="1" fill="#FBC02D"/><rect width="1" height="1" x="3" y="2" fill="#F9A825"/><rect width="2" height="1" x="4" y="2" fill="#FBC02D"/><rect width="1" height="1" x="6" y="2" fill="#F9A825"/><rect width="1" height="1" x="7" y="2" fill="#FBC02D"/><rect width="1" height="1" x="8" y="2" fill="#F9A825"/><rect width="2" height="1" x="9" y="2" fill="#FBC02D"/><rect width="1" height="1" x="11" y="2" fill="#F9A825"/><rect width="1" height="1" x="2" y="3" fill="#F9A825"/><rect width="3" height="1" x="3" y="3" fill="#FBC02D"/><rect width="1" height="1" x="6" y="3" fill="#F9A825"/><rect width="1" height="1" x="7" y="3" fill="#FBC02D"/><rect width="1" height="1" x="8" y="3" fill="#F9A825"/><rect width="3" height="1" x="9" y="3" fill="#FBC02D"/><rect width="1" height="1" x="12" y="3" fill="#F9A825"/><rect width="2" height="1" x="1" y="4" fill="#F9A825"/><rect width="9" height="1" x="3" y="4" fill="#FBC02D"/><rect width="2" height="1" x="12" y="4" fill="#F9A825"/><rect width="15" height="1" x="0" y="5" fill="#F9A825"/></g><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><g class="arm-l-rest"><rect id="left-arm" width="2" height="2" x="0" y="9"/></g><g class="arm-hammer"><rect id="right-arm" width="2" height="2" x="13" y="9"/><g id="hammer"><rect width="1" height="6" x="13.5" y="4" fill="#795548"/><rect width="3" height="2" x="12.5" y="3" fill="#9E9E9E"/></g></g></g><g fill="#000" class="eyes-blink"><rect id="left-eye" width="1.5" height="1.5" x="4" y="8.5"/><rect id="right-eye" width="1.5" height="1.5" x="9.5" y="8.5"/></g></g></svg>