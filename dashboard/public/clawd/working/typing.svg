<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes jitter{0%{transform:translateY(0)}}@keyframes type-l{0%{transform:rotate(70deg)}25%{transform:rotate(110deg)}50%{transform:rotate(80deg)}75%{transform:rotate(100deg)}}@keyframes type-r{0%{transform:rotate(-80deg)}25%{transform:rotate(-100deg)}50%{transform:rotate(-70deg)}75%{transform:rotate(-110deg)}}@keyframes read-code{0%,14%,85%{transform:translate(-2px,0)}15%,29%{transform:translate(-1px,0)}30%,44%{transform:translate(0,0)}45%,59%{transform:translate(1px,0)}60%,84%{transform:translate(2px,0)}}@keyframes float-data{0%{transform:translateY(0) scale(.5);opacity:0}20%{opacity:.8}}@keyframes logo-pulse{0%{opacity:.4}}.body-jitter{transform-origin:7.5px 15px;animation:jitter .08s infinite alternate ease-in-out}.arm-l-type{transform-origin:2px 10px;animation:type-l .15s infinite ease-in-out}.arm-r-type{transform-origin:13px 10px;animation:type-r .12s infinite ease-in-out}.eyes-read{animation:read-code 1.2s infinite}.data-bit{opacity:0;animation:float-data 1s infinite linear}.d1{animation-delay:0s;transform-origin:-2px 10px}.d2{animation-delay:.3s;transform-origin:5px 12px}.d3{animation-delay:.6s;transform-origin:12px 11px}.d4{animation-delay:.8s;transform-origin:17px 9px}.d5{animation-delay:.1s;transform-origin:8px 10px}.d6{animation-delay:.4s;transform-origin:0 11px}.d7{animation-delay:.7s;transform-origin:15px 12px}.logo-glow{animation:logo-pulse 1.5s infinite alternate ease-in-out}</style><g id="pixel-packet"><rect width="1.5" height="1.5" x="0" y="0"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g fill="#40C4FF" class="data-particles"><use x="-2" y="12" class="data-bit d1" href="#pixel-packet"/><use x="5" y="11" class="data-bit d2" href="#pixel-packet"/><use x="12" y="13" class="data-bit d3" href="#pixel-packet"/><use x="17" y="11" class="data-bit d4" href="#pixel-packet"/><use x="8" y="10" class="data-bit d5" href="#pixel-packet"/><use x="1" y="11" class="data-bit d6" href="#pixel-packet"/><use x="15" y="12" class="data-bit d7" href="#pixel-packet"/></g><g class="body-jitter"><g id="body-color-group" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/><rect id="torso" width="11" height="7" x="2" y="6"/><g class="arm-l-type"><rect id="left-arm" width="2" height="2" x="0" y="9"/></g><g class="arm-r-type"><rect id="right-arm" width="2" height="2" x="13" y="9"/></g></g><g fill="#000"><g class="eyes-read"><rect id="left-eye-squint" width="1" height="1" x="4" y="8.5"/><rect id="right-eye-squint" width="1" height="1" x="10" y="8.5"/></g></g></g><g id="laptop" transform="translate(3, 9.5)"><rect width="10" height="1" x="-.5" y="5" fill="#546E7A" rx=".5"/><rect width="9" height="5.5" x="0" y="0" fill="#78909C" rx=".5"/><circle cx="4.5" cy="2.5" r="1.5" fill="#40C4FF" class="logo-glow" opacity=".2"/><rect width="1" height="1" x="4" y="2" fill="#FFF" class="logo-glow"/></g></svg>