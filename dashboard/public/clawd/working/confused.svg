<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -25 45 45"><defs><style>@keyframes body-look{0%,10%,40%,45%,75%{transform:translate(0,0)}15%,35%{transform:translate(-2px,0) rotate(-2deg)}50%,70%{transform:translate(2px,0) rotate(2deg)}}@keyframes eyes-look{0%,10%,40%,45%,75%{transform:translate(0,0)}15%,35%{transform:translate(-3px,0)}50%,70%{transform:translate(3px,0)}}@keyframes blink{0%,13%,17%,48%,52%,80%,84%{transform:scaleY(1)}15%,50%,82%{transform:scaleY(.1)}}@keyframes question-pop-l{0%,15%{opacity:0;transform:translate(-6px,6px) scale(.5)}20%,30%{opacity:1;transform:translate(-8px,-2px) scale(1)}35%{opacity:0;transform:translate(-8px,-8px) scale(1.2)}}@keyframes question-pop-r{0%,50%{opacity:0;transform:translate(6px,6px) scale(.5)}55%,65%{opacity:1;transform:translate(8px,-2px) scale(1)}70%{opacity:0;transform:translate(8px,-8px) scale(1.2)}}.body-anim{transform-origin:7.5px 15px;animation:body-look 6s infinite ease-in-out}.eyes-anim{animation:eyes-look 6s infinite ease-in-out}.eyes-blink{transform-origin:7.5px 9px;animation:blink 6s infinite linear}.question-mark-l,.question-mark-r{transform-origin:center;animation:question-pop-l 6s infinite ease-in-out;opacity:0}.question-mark-r{animation:question-pop-r 6s infinite ease-in-out}</style><g id="pixel-question"><rect width="2" height="1" x="1" y="0"/><rect width="1" height="1" x="0" y="1"/><rect width="1" height="2" x="3" y="1"/><rect width="1" height="1" x="2" y="3"/><rect width="1" height="1" x="1" y="4"/><rect width="1" height="1" x="1" y="6"/></g></defs><rect id="ground-shadow" width="9" height="1" x="3" y="15" fill="#000" opacity=".5"/><g id="legs" fill="#DE886D"><rect id="outer-left-leg" width="1" height="2" x="3" y="13"/><rect id="inner-left-leg" width="1" height="2" x="5" y="13"/><rect id="inner-right-leg" width="1" height="2" x="9" y="13"/><rect id="outer-right-leg" width="1" height="2" x="11" y="13"/></g><g class="body-anim"><g fill="#DE886D"><rect id="torso" width="11" height="7" x="2" y="6"/><rect id="left-arm" width="2" height="2" x="-1" y="7" transform="rotate(15 0 8)"/><rect id="right-arm" width="2" height="2" x="13" y="9"/></g><g class="eyes-anim"><g fill="#000" class="eyes-blink"><rect id="left-eye" width="1" height="2" x="4" y="8"/><rect id="right-eye" width="1" height="2" x="10" y="8"/></g></g></g><g fill="#40C4FF" class="question-mark-l" transform="translate(0, 0)"><use href="#pixel-question"/></g><g fill="#FFC107" class="question-mark-r" transform="translate(10, 0)"><use href="#pixel-question"/></g></svg>